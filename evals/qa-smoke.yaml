version: 1
name: qa-smoke
endpoint:
  url: "https://qa-chat.xevyo.com/xevyo/v1"
  url_env: XEVYO_STAGING_URL
  api_key_env: XEVYO_API_KEY
  version_header: X-Endpoint-Version
model: xevyo
suites:
  - smoke.yaml
run:
  stream: false
  concurrency: 1
  rate_limit_per_minute: 1
  request_timeout_seconds: 90
  max_retries: 1
  backoff_initial_seconds: 1.0
  backoff_max_seconds: 5.0
  temperature: 0.0
  max_tokens: 16
  send_conversation_ids: false
  seed: 2026
  cache: false
  fail_on_partial: true
judge:
  enabled: false
thresholds:
  overall_pass_rate: 1.0
report:
  output: ../artifacts/smoke-scorecard.html
  history_db: ../artifacts/smoke.sqlite3
  compare_previous: false
  include_regression_samples: false
  redact_sensitive: true
  bootstrap_samples: 1000
  confidence_level: 0.95
